services:

  db:
    image: postgres:17
    container_name: postgres_db

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: hospital_db

    ports:
      - "5432:5432"

  redis:
    image: redis:latest
    container_name: redis_server

    ports:
    - "6379:6379"

  fastapi:
    build: .
    container_name: hospital_api

    ports:
      - "8000:8000"

    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/hospital_db
      REDIS_HOST: redis
      REDIS_PORT: 6379

    depends_on:
      - db
      - redis